@if (visible()) {
  <div class="loader" role="status" aria-live="polite" aria-busy="true">
    <div class="loader__brand">
      <span class="loader__mark">MM</span>
      <span class="loader__divider" aria-hidden="true"></span>
      <span class="loader__name">Maicon Machado</span>
    </div>

    <div class="loader__bar" aria-hidden="true">
      <div class="loader__fill" [style.width.%]="progress()"></div>
    </div>

    <div class="loader__meta">
      <span class="loader__pct">{{ progress() }}</span>
      <span class="loader__label">carregando experiência</span>
    </div>
  </div>
}
