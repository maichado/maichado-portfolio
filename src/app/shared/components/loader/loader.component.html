@if (visible()) {
  <div class="loader" role="status" aria-live="polite" aria-busy="true">
    <span class="visually-hidden">A carregar o portfólio de Maicon Machado.</span>

    <div class="loader__center">
      <div class="loader__glow" aria-hidden="true"></div>
      <img
        class="loader__logo"
        src="logo2.png"
        alt="Maicon Machado — logotipo MM"
        width="96"
        height="96"
        decoding="async"
        fetchpriority="high"
      />
      <p class="loader__subtitle">Maicon Machado</p>
      <div class="loader__shimmer" aria-hidden="true">
        <div class="loader__shimmer-track"></div>
      </div>
    </div>
  </div>
}
