<section
  #section
  class="hero"
  id="hero"
  appSectionAnchor="hero"
  [class.is-entered]="entered()"
  aria-labelledby="hero-name"
>
  <div class="hero__bg" aria-hidden="true">
    <div class="hero__dots"></div>
    <div class="hero__spotlight"></div>
  </div>

  <div class="hero__container">
    <div class="hero__eyebrow">
      <span class="hero__eyebrow-dot" aria-hidden="true"></span>
      <span>Capgemini Brasil · Banco Bradesco</span>
    </div>

    <h1 id="hero-name" class="hero__name" aria-label="Maicon Machado">
      <span class="hero__name-enter">
        <span class="hero__name-block">
          <span class="hero__name-layer">MAICON</span>
          <span class="hero__name-layer">MAICON</span>
          <span class="hero__name-layer">MAICON</span>
          <span class="hero__name-layer">MAICON</span>
          <span class="hero__name-layer">MAICON</span>
          <span class="hero__name-layer">MAICON</span>
        </span>
      </span>
      <span class="hero__name-enter hero__name-enter--delay">
        <span class="hero__name-block hero__name-block--accent">
          <span class="hero__name-layer">MACHADO</span>
          <span class="hero__name-layer">MACHADO</span>
          <span class="hero__name-layer">MACHADO</span>
          <span class="hero__name-layer">MACHADO</span>
          <span class="hero__name-layer">MACHADO</span>
          <span class="hero__name-layer">MACHADO</span>
        </span>
      </span>
    </h1>

    <p class="hero__role" aria-live="polite">
      <span class="hero__role-prefix">›</span>
      <span class="hero__typed">{{ typed() }}</span>
      <span class="hero__caret" aria-hidden="true"></span>
    </p>

    <p class="hero__meta">Capgemini Brasil — Bradesco — Angular 19+ — Microfrontends</p>

    <div class="hero__ctas">
      <a class="cta cta--primary" appMagnetic [strength]="0.3" href="#projetos">
        <span>Ver projetos</span>
        <svg viewBox="0 0 24 24" width="16" height="16" aria-hidden="true">
          <path
            d="M5 12h14M13 5l7 7-7 7"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
            stroke-linecap="round"
            stroke-linejoin="round"
          />
        </svg>
      </a>
      <a class="cta cta--ghost" appMagnetic [strength]="0.2" href="#contato">
        <span>Falar comigo</span>
      </a>
    </div>

    <app-hero-game class="hero__badge-slot"></app-hero-game>
  </div>

  <a class="hero__scroll" href="#skills" aria-label="Rolar para skills">
    <span class="hero__scroll-label">Scroll</span>
    <span class="hero__scroll-line" aria-hidden="true"></span>
  </a>
</section>
